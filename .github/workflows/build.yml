name: Build

on:
  workflow_call:
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build-and-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=tiago-bitten_aula-devops-01
            -Dsonar.organization=tiago-bitten
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=src
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/aula-devops-01:${{github.sha}} .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/aula-devops-01:${{github.sha}}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          image-ref: 'docker.io/${{ secrets.DOCKER_USERNAME }}/aula-devops-01:${{github.sha}}'
          format: json
          output: trivy-results.json
          severity: MEDIUM,HIGH,CRITICAL

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results.json
          path: trivy-results.json

      - name: Analyze Trivy results
        run: |
          VULN_COUNT_MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "MEDIUM")] | length' trivy-results.json || echo 0)
          VULN_COUNT_HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-results.json || echo 0)
          VULN_COUNT_CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-results.json || echo 0)

          echo "---------------------------------------"
          echo "Relatorio de Seguranca:"
          echo "Medias: $VULN_COUNT_MEDIUM"
          echo "Altas: $VULN_COUNT_HIGH"
          echo "Criticas: $VULN_COUNT_CRITICAL"
          echo "---------------------------------------"

          if [ "$VULN_COUNT_MEDIUM" -gt 5 ]; then
             echo "[ERRO] Bloqueado: Mais de 5 vulnerabilidades MEDIAS."
             exit 1
          fi

          if [ "$VULN_COUNT_HIGH" -gt 5 ]; then
             echo "[ERRO] Bloqueado: Mais de 5 vulnerabilidades ALTAS."
             exit 1
          fi

          if [ "$VULN_COUNT_CRITICAL" -gt 0 ]; then
             echo "[ERRO] Bloqueado: Vulnerabilidade CRITICA encontrada."
             exit 1
          fi

          echo "[SUCESSO] Imagem aprovada nos requisitos de seguranca."
