name: Deploy para GKE

on:
  workflow_run:
    workflows: ['Build']
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar no Google Cloud (OIDC)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider2'
          service_account: 'gke-deploy-sa@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

      - name: Configurar Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Obter credenciais GKE
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ vars.GKE_CLUSTER_NAME }}
          location: ${{ vars.GKE_CLUSTER_LOCATION }}

      - name: Replace vars in k8s manifests
        run: |
          # Substitui placeholders em todos os manifests k8s
          sed -i 's/##DOCKER_USERNAME##/${{ secrets.DOCKER_USERNAME }}/g' k8s/*.yaml
          sed -i 's/##K8S_NAMESPACE##/${{ vars.K8S_NAMESPACE }}/g' k8s/*.yaml
          sed -i 's/##K8S_TAG##/${{ github.sha }}/g' k8s/*.yaml

      - name: Criar namespace se não existir
        run: |
          # Cria namespace ${{ vars.K8S_NAMESPACE }} idempotentemente
          kubectl create namespace ${{ vars.K8S_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Aplicar manifests Kubernetes
        run: |
          # Aplica deployment.yaml e service.yaml do diretório k8s/
          kubectl apply -f k8s/ -n ${{ vars.K8S_NAMESPACE }}
